name: Deploy Campus2Career

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Build & deploy AI backend to Google Cloud Run ─────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.get-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/campus2career/campus2career-ai:${{ github.sha }}"
          docker build -t "$IMAGE" ./ai-engine
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy campus2career-ai \
            --image "$IMAGE" \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 60 \
            --set-env-vars "ALLOWED_ORIGIN=https://campus2career-assistant.web.app" \
            --set-secrets "OPENROUTER_API_KEY=openrouter-api-key:latest" \
            --quiet

      - name: Get backend URL
        id: get-url
        run: |
          URL=$(gcloud run services describe campus2career-ai \
            --region ${{ secrets.GCP_REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Backend deployed at: $URL"

  # ── Job 2: Build & deploy frontend to Firebase Hosting ───────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AI_BACKEND_URL: ${{ needs.deploy-backend.outputs.backend_url }}
          VITE_APP_ENV: production
          VITE_AI_RATE_LIMIT: 30
          VITE_API_RATE_LIMIT: 100
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: campus2career-assistant-assistant

      - name: Deployment summary
        run: |
          echo "🚀 Frontend → https://campus2career-assistant.web.app"
          echo "🤖 Backend  → ${{ needs.deploy-backend.outputs.backend_url }}"
